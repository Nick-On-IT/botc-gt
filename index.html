<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blood on the Clocktower – Personage Portaal</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: #0c0a10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Crimson Pro', Georgia, serif;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 0%, #1a1028 0%, transparent 65%),
        #0c0a10;
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 8% 12%, rgba(255,240,180,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 38%, rgba(255,240,180,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 8%, rgba(255,240,180,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 68% 28%, rgba(255,240,180,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 82% 55%, rgba(255,240,180,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 72%, rgba(255,240,180,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 18%, rgba(255,240,180,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, rgba(255,240,180,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,240,180,0.25) 0%, transparent 100%);
      pointer-events: none;
    }

    .logo-area {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(180, 140, 60, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.75rem;
      background: rgba(20, 14, 35, 0.7);
      position: relative;
      z-index: 1;
    }

    .logo-area::before {
      content: '';
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 0.5px solid rgba(180, 140, 60, 0.12);
    }

    .logo-area img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 50%;
    }

    .logo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(180, 140, 60, 0.45);
      font-family: 'Crimson Pro', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 1rem;
    }

    .title {
      font-family: 'UnifrakturMaguntia', 'Palatino Linotype', serif;
      font-size: clamp(22px, 5vw, 36px);
      font-weight: 400;
      color: #d4a84b;
      text-align: center;
      letter-spacing: 0.03em;
      line-height: 1.2;
      margin-bottom: 0.6rem;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-family: 'IM Fell English', 'Palatino Linotype', serif;
      font-size: 14px;
      font-weight: 400;
      font-style: italic;
      color: rgba(212, 168, 75, 0.5);
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .ornament-line {
      width: 60px;
      height: 0.5px;
      background: rgba(180, 140, 60, 0.3);
    }

    .ornament-diamond {
      width: 6px;
      height: 6px;
      background: rgba(180, 140, 60, 0.5);
      transform: rotate(45deg);
    }

    .ornament-dot {
      width: 3px;
      height: 3px;
      background: rgba(180, 140, 60, 0.3);
      border-radius: 50%;
    }

    .language-prompt {
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      font-style: italic;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 1.4rem;
      position: relative;
      z-index: 1;
    }

    .language-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .lang-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 0.5px solid rgba(180, 140, 60, 0.22);
      border-radius: 2px;
      padding: 1.3rem 1rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .lang-btn::before,
    .lang-btn::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: rgba(180, 140, 60, 0.35);
      border-style: solid;
    }

    .lang-btn::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .lang-btn::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .lang-btn:hover {
      background: rgba(180, 140, 60, 0.07);
      border-color: rgba(180, 140, 60, 0.5);
    }

    .lang-icon {
      font-size: 2rem;
      color: rgba(180, 140, 60, 0.65);
    }

    .lang-label {
      font-family: 'UnifrakturMaguntia', serif;
      font-size: 15px;
      color: #d4a84b;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .lang-desc {
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      font-style: italic;
      color: rgba(212, 168, 75, 0.4);
      text-align: center;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .language-grid {
        grid-template-columns: 1fr;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="stars"></div>

    <div class="logo-area">
      <!-- Vervang onderstaande placeholder door je eigen logo -->
      <!-- <img src="images/logo.png" alt="Blood on the Clocktower logo" /> -->
      <div class="logo-placeholder">logo hier</div>
    </div>

    <h1 class="title">Blood on the Clocktower</h1>
    <p class="subtitle">Uitleggen van de personages in BotC</p>

    <div class="ornament">
      <div class="ornament-dot"></div>
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
      <div class="ornament-dot"></div>
    </div>

    <p class="language-prompt">Kies uw taal</p>

    <div class="language-grid">
      <a class="lang-btn" href="nl/index.html" aria-label="Nederlandse versie">
        <span class="lang-icon">📖</span>
        <span class="lang-label">Nederlands</span>
        <span class="lang-desc">Tekst &amp; uitleg</span>
      </a>
      <a class="lang-btn" href="vgt/index.html" aria-label="Vlaams Gebarentaal versie">
        <span class="lang-icon">🤟</span>
        <span class="lang-label">Vlaams Gebarentaal</span>
        <span class="lang-desc">Tekst &amp; uitleg</span>
      </a>
    </div>
  </div>
</body>
</html>
